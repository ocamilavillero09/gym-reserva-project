version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: gym-mongodb
    hostname: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: gym_reservas_universitario
    volumes:
      - mongodb_data:/data/db
      - ./init.mongodb.js:/docker-entrypoint-initdb.d/init.mongodb.js:ro
    networks:
      - gym-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --username admin --password password --authenticationDatabase admin --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongodb_data:
    driver: local

networks:
  gym-network:
    driver: bridge
